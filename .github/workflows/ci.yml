name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        # Lean install: runtime deps + API/test extras only. The offline test
        # suite doesn't need the heavy eval/reranker stack (ragas, torch),
        # so we skip it here to keep CI fast and reliable.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-app.txt
          pip install fastapi "uvicorn[standard]" sse-starlette python-multipart httpx pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        # Tests run fully offline — no GOOGLE_API_KEY needed (fake embeddings,
        # fake LLM, embedded Qdrant).
        run: python -m pytest -q
